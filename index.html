    <style>
        /* BASE STYLES */
        body { background-color: #050505; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }
        a { text-decoration: none; }
        
        /* HEADER */
        header { text-align: center; padding: 40px 20px; background: #111; border-bottom: 1px solid #222; }
        h1 { color: #ff0055; text-transform: uppercase; margin: 0; letter-spacing: 2px; font-size: 2.5rem; }
        .subtitle { color: #888; margin-top: 10px; font-size: 1rem; }
        
        /* SEARCH & FILTER SECTION */
        .controls { max-width: 1200px; margin: 20px auto; text-align: center; padding: 0 20px; }
        
        #search { 
            width: 100%; max-width: 500px; padding: 12px 20px; 
            border-radius: 30px; border: 1px solid #333; 
            background: #1a1a1a; color: white; outline: none; 
            font-size: 1rem; margin-bottom: 20px;
        }
        #search:focus { border-color: #ff0055; }
        
        .filter-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .filter-btn { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #ccc; 
            padding: 8px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .filter-btn.active, .filter-btn:hover { background: #ff0055; color: white; border-color: #ff0055; }
        
        /* BADGE COUNT STYLE */
        .count-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* PRODUCT GRID */
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* PRODUCT CARD */
        .card { 
            background: #121212; border: 1px solid #222; 
            border-radius: 12px; overflow: hidden; 
            transition: 0.3s; display: flex; flex-direction: column; 
        }
        .card:hover { transform: translateY(-5px); border-color: #ff0055; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.2); }
        
        /* IMAGE PLACEHOLDER AREA */
        .img-box { 
            height: 300px; 
            background: #080808; 
            display: flex; align-items: center; justify-content: center; 
            border-bottom: 1px solid #222; position: relative; overflow: hidden;
        }
        .img-box i { font-size: 4rem; color: #333; transition: 0.3s; }
        .card:hover .img-box i { color: #ff0055; transform: scale(1.1); }
        
        /* REAL IMAGE STYLING */
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #fff; 
            transition: 0.3s;
        }
        
        .card:hover .img-box img { transform: scale(1.05); }

        /* CATEGORY SPECIFIC COLORS */
        .card.christmas { border-color: #330000; }
        .card.christmas:hover { border-color: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2); }
        
        .card.swim { border-color: #001a22; }
        .card.swim:hover { border-color: #00ccff; box-shadow: 0 5px 15px rgba(0, 204, 255, 0.2); }
        
        .card.toy { border-color: #33001a; }
        .card.toy:hover { border-color: #ff00aa; box-shadow: 0 5px 15px rgba(255, 0, 170, 0.2); }
        
        .card.activewear { border-color: #1a0033; }
        .card.activewear:hover { border-color: #aa00ff; box-shadow: 0 5px 15px rgba(170, 0, 255, 0.2); }

        .card.tech { border-color: #002233; }
        .card.tech:hover { border-color: #00e5ff; box-shadow: 0 5px 15px rgba(0, 229, 255, 0.2); }
        
        .card.wellness { border-color: #003300; }
        .card.wellness:hover { border-color: #00ff44; box-shadow: 0 5px 15px rgba(0, 255, 68, 0.2); }

        .card.kitchen { border-color: #332200; }
        .card.kitchen:hover { border-color: #ffcc00; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2); }
        
        .card.jewelry { border-color: #332200; }
        .card.jewelry:hover { border-color: #FFD700; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2); }
        
        .card.book { border-color: #331a00; }
        .card.book:hover { border-color: #ff8800; box-shadow: 0 5px 15px rgba(255, 136, 0, 0.2); }

        /* CARD INFO */
        .info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .cat { font-size: 0.75rem; color: #ff0055; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .title { font-size: 0.95rem; line-height: 1.4; margin-bottom: 15px; color: #ddd; flex-grow: 1; }
        .price { font-size: 1.2rem; color: #00e676; font-weight: bold; margin-bottom: 15px; }
        
        /* BUTTON */
        .btn { 
            display: block; text-align: center; padding: 12px; 
            border: 1px solid #444; color: #ccc; 
            border-radius: 50px; transition: 0.3s; font-weight: 600; 
        }
        .btn:hover { background: #ff0055; color: white; border-color: #ff0055; }
        
        #loading-msg { text-align: center; color: #ff0055; font-size: 1.5rem; margin-top: 50px; }
        
        footer { text-align: center; margin-top: 80px; padding: 30px; border-top: 1px solid #222; color: #666; font-size: 0.9rem; }
    </style>
